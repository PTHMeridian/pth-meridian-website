// ── DESIGN TOKENS ─────────────────────────────────────────────
const C = {
  void:"#000000",deep:"#080808",surface:"#0E0E0E",raised:"#141414",
  border:"#1C1C1C",borderHi:"#2A2A2A",silver:"#C0C0D0",ice:"#E8E8FF",

  green:"#4ade80",yellow:"#fbbf24",red:"#f87171",
};
const mid = r => Math.round((r[0]+r[1])/2);
const rangeColor = r => { const m=mid(r); return m>=65?C.green:m>=40?C.yellow:C.red; };
const rangeLabel = r => { const m=mid(r); return m>=65?"Favourable":m>=40?"Moderate":"Challenging"; };
const rangeStr = r => r[0]+"–"+r[1]+"%";
const impactColor = s => s>=65?C.green:s>=40?C.yellow:C.red;

// ── LAYOUT ────────────────────────────────────────────────────
const SVG_W=1000, NW=145, NH=62, RW=210, RH=58, PAD=14;
const LY=[54,196,346,498];

function groupPos(parentX, count, preferred) {
  const minSpan=NW+16;
  const maxSpan=count>1?(SVG_W-NW-PAD*2)/(count-1):preferred;
  const span=Math.max(minSpan,Math.min(preferred,maxSpan));
  const total=(count-1)*span;
  let start=parentX-total/2;
  start=Math.max(NW/2+PAD,start);
  const rw=SVG_W-NW/2-PAD;
  if(start+total>rw) start=rw-total;
  start=Math.max(NW/2+PAD,start);
  return Array.from({length:count},(_,i)=>start+i*span);
}

// ── TREE TRAVERSAL ────────────────────────────────────────────
function findNode(tree, id) {
  if (!tree) return null;
  if (tree.id===id) return tree;
  if (tree.children) for (const c of tree.children) {
    const found=findNode(c,id);
    if (found) return found;
  }
  return null;
}

function computeLayout(root, selL1, selL2) {
  const nodes=[], edges=[];
  nodes.push({id:"root",x:SVG_W/2,y:LY[0],w:RW,h:RH,level:0,type:"root",label:root.label});

  const l1s=root.children;
  const l1Xs=groupPos(SVG_W/2,l1s.length,SVG_W/l1s.length);
  l1s.forEach((n,i)=>{
    const x=l1Xs[i];
    nodes.push({id:n.id,x,y:LY[1],w:NW,h:NH,level:1,type:n.type,label:n.label});
    edges.push({from:"root",to:n.id,fx:SVG_W/2,fy:LY[0]+RH/2,tx:x,ty:LY[1]-NH/2});
  });

  if(selL1){
    const l1n=l1s.find(n=>n.id===selL1);
    const l1p=nodes.find(n=>n.id===selL1);
    if(l1n?.children){
      const xs=groupPos(l1p.x,l1n.children.length,215);
      l1n.children.forEach((n,i)=>{
        const x=xs[i];
        nodes.push({id:n.id,x,y:LY[2],w:NW,h:NH,level:2,type:n.type,label:n.label,aiRange:n.aiRange});
        edges.push({from:selL1,to:n.id,fx:l1p.x,fy:LY[1]+NH/2,tx:x,ty:LY[2]-NH/2});
      });
    }
  }

  if(selL1&&selL2){
    const l1n=l1s.find(n=>n.id===selL1);
    const l2n=l1n?.children?.find(n=>n.id===selL2);
    const l2p=nodes.find(n=>n.id===selL2);
    if(l2n?.children&&l2p){
      const xs=groupPos(l2p.x,l2n.children.length,195);
      l2n.children.forEach((n,i)=>{
        const x=xs[i];
        nodes.push({id:n.id,x,y:LY[3],w:NW,h:NH,level:3,type:n.type,label:n.label,aiRange:n.aiRange});
        edges.push({from:selL2,to:n.id,fx:l2p.x,fy:LY[2]+NH/2,tx:x,ty:LY[3]-NH/2});
      });
    }
  }
  return {nodes,edges};
}

function svgHeight(root,selL1,selL2){
  if(!selL1) return LY[1]+NH/2+44;
  const l1=root.children.find(n=>n.id===selL1);
  if(!l1?.children) return LY[1]+NH/2+44;
  const hasL3=selL2&&l1.children.find(n=>n.id===selL2)?.children?.length>0;
  return hasL3?LY[3]+NH/2+44:LY[2]+NH/2+44;
}

  const root=scen.root;

  function switchScenario(idx){
    setScenIdx(idx);
    setSelL1(null);setSelL2(null);setSelLeaf(null);setHuman(50);
  }

  const {nodes,edges}=computeLayout(root,selL1,selL2);
  const h=svgHeight(root,selL1,selL2);
  const pathSet=new Set(["root",...[selL1,selL2,selLeaf].filter(Boolean)]);

  function handleClick(id){
    const nd=nodes.find(n=>n.id===id);
    if(!nd) return;
    if(id==="root"){setSelL1(null);setSelL2(null);setSelLeaf(null);setHuman(50);return;}
    if(nd.level===1){setSelL1(selL1===id?null:id);setSelL2(null);setSelLeaf(null);setHuman(50);return;}
    if(nd.level===2){
      const fn=findNode(root,id);
      if(fn?.type==="leaf"){setSelLeaf(id);setHuman(50);return;}
      setSelL2(selL2===id?null:id);setSelLeaf(null);setHuman(50);return;
    }
    if(nd.level===3){setSelLeaf(id);setHuman(50);}
  }

  const leafData=selLeaf?findNode(root,selLeaf):null;

  return React.createElement("div",{style:{background:C.void,minHeight:"100vh",color:C.text,fontFamily:"IBM Plex Sans,sans-serif",fontWeight:300}},

    // ── HEADER ─────────────────────────────────────────────
    React.createElement("div",{style:{position:"sticky",top:0,zIndex:100,background:"rgba(0,0,0,0.96)",borderBottom:"1px solid "+C.border,backdropFilter:"blur(20px)"}},
      React.createElement("div",{style:{maxWidth:"1060px",margin:"0 auto",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
        React.createElement("div",null,
          React.createElement("span",{style:{fontFamily:"Barlow Condensed,sans-serif",fontSize:"1.2rem",fontWeight:800,color:C.text,textTransform:"uppercase",letterSpacing:"0.1em"}},"AMuN"),
          React.createElement("span",{style:{fontFamily:"IBM Plex Mono,monospace",fontSize:"8.5px",color:"#252535",letterSpacing:"0.12em",textTransform:"uppercase",marginLeft:"10px"}},"Decision Navigator · PTH Meridian")
        ),
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
          selL1&&React.createElement("button",{onClick:()=>{setSelL1(null);setSelL2(null);setSelLeaf(null);setHuman(50);},style:{background:"none",border:"1px solid "+C.border,color:C.muted,fontFamily:"IBM Plex Mono,monospace",fontSize:"8.5px",padding:"3px 8px",cursor:"pointer",letterSpacing:"0.1em",borderRadius:"3px"}},"RESTART")
        )
      )
    ),

    React.createElement("div",{style:{maxWidth:"1060px",margin:"0 auto",padding:"14px 16px 44px"}},

      // ── DISCLAIMER ─────────────────────────────────────
      React.createElement("div",{style:{background:"rgba(251,191,36,0.03)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:"4px",padding:"8px 12px",marginBottom:"14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px"}},
        React.createElement("div",{style:{fontSize:"9px",fontFamily:"IBM Plex Mono,monospace",color:"#35350A",lineHeight:1.6}},
          React.createElement("span",{style:{color:"#fbbf24",fontWeight:600}},"⚠ ESTIMATED RANGES ONLY — grounded in official public data · "),
          discOpen?DISCLAIMER:DISCLAIMER.slice(0,100)+"…"
        ),
        React.createElement("button",{onClick:()=>setDiscOpen(v=>!v),style:{background:"none",border:"1px solid rgba(251,191,36,0.18)",color:"#fbbf24",padding:"2px 7px",cursor:"pointer",fontFamily:"IBM Plex Mono,monospace",fontSize:"7.5px",whiteSpace:"nowrap",borderRadius:"2px",flexShrink:0}},discOpen?"HIDE":"MORE")
      ),

      // ── SCENARIO SELECTOR ──────────────────────────────
      React.createElement("div",{style:{marginBottom:"16px"}},
        React.createElement("div",{style:{fontSize:"8.5px",color:C.muted,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:"8px"}},"// SELECT SCENARIO"),
        React.createElement("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}},
          SCENARIOS.map((s,i)=>
            React.createElement("button",{key:s.id,onClick:()=>switchScenario(i),style:{
              background:i===scenIdx?"#0E0E1E":C.void,
              border:"1px solid "+(i===scenIdx?C.silver:C.border),
              borderRadius:"4px",padding:"8px 14px",cursor:"pointer",
              textAlign:"left",transition:"all 0.18s",minWidth:"160px",
              fontFamily:"IBM Plex Mono,monospace"
            }},
              React.createElement("div",{style:{fontSize:"8px",color:i===scenIdx?C.silver:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"2px"}},s.tag),
              React.createElement("div",{style:{fontSize:"10px",color:i===scenIdx?C.ice:C.muted,fontWeight:500,lineHeight:1.3}},s.title)
            )
          )
        )
      ),

      // ── ACTIVE SCENARIO HEADER ─────────────────────────
      React.createElement("div",{style:{background:C.deep,border:"1px solid "+C.border,borderRadius:"6px",padding:"14px 18px",marginBottom:"12px"}},
        React.createElement("div",{style:{fontSize:"8px",color:C.silver,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:"5px"}},"// ACTIVE SCENARIO"),
        React.createElement("div",{style:{fontFamily:"Barlow Condensed,sans-serif",fontSize:"1.3rem",fontWeight:800,color:C.ice,textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:"4px"}},scen.title),
        React.createElement("p",{style:{fontSize:"11px",color:C.muted,lineHeight:1.6,marginBottom:"6px"}},scen.subtitle),
        React.createElement("div",{style:{fontSize:"8px",color:"#252530",fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.06em"}},"Sources: "+scen.sources)
      ),

      // ── INSTRUCTION ────────────────────────────────────
      React.createElement("div",{style:{textAlign:"center",fontFamily:"IBM Plex Mono,monospace",fontSize:"8.5px",color:"#181828",letterSpacing:"0.08em",marginBottom:"10px"}},"Click any node to expand its branch · Continue until you reach an outcome (range badge)"),

      // ── TREE ───────────────────────────────────────────
      React.createElement("div",{style:{background:C.deep,border:"1px solid "+C.border,borderRadius:"8px",overflow:"auto"}},
        React.createElement("svg",{width:SVG_W,height:h,viewBox:"0 0 "+SVG_W+" "+h,style:{display:"block",width:"100%",minWidth:"620px"}},
          [0,1,2,3].filter(lv=>nodes.some(n=>n.level===lv)).map(lv=>
            React.createElement("line",{key:"gl"+lv,x1:30,y1:LY[lv],x2:SVG_W-30,y2:LY[lv],stroke:"#0A0A14",strokeWidth:1,strokeDasharray:"3 16"})
          ),
          edges.map((e,i)=>React.createElement(Edge,{key:"e"+i,fx:e.fx,fy:e.fy,tx:e.tx,ty:e.ty,active:pathSet.has(e.from)&&pathSet.has(e.to)})),
          nodes.map(n=>React.createElement(TreeNode,{key:n.id,...n,selected:n.id===selL1||n.id===selL2||n.id===selLeaf,onPath:pathSet.has(n.id),onClick:handleClick})),
          [["ROOT",0],["PRIMARY CONCERN",1],selL1?["APPROACH",2]:null,selL2?["SPECIFIC OPTION",3]:null].filter(Boolean).map(([lbl,lv])=>
            React.createElement("text",{key:"lbl"+lv,x:22,y:LY[lv]-NH/2-12,fill:"#121220",fontSize:6.5,fontFamily:"IBM Plex Mono,monospace",letterSpacing:1.2},lbl)
          )
        )
      ),

      // ── LEGEND ─────────────────────────────────────────
      React.createElement("div",{style:{display:"flex",gap:"20px",flexWrap:"wrap",justifyContent:"center",marginTop:"10px"}},
        [[C.green,"≥65% range — Favourable"],[C.yellow,"40–64% range — Moderate"],[C.red,"<40% range — Challenging"]].map(([c,l])=>
          React.createElement("div",{key:l,style:{display:"flex",alignItems:"center",gap:"5px"}},
            React.createElement("div",{style:{width:"14px",height:"4px",borderRadius:"2px",background:c}}),
            React.createElement("span",{style:{fontSize:"8.5px",color:C.muted,fontFamily:"IBM Plex Mono,monospace"}},l)
          )
        )
      ),

      selL1&&!selLeaf&&React.createElement("div",{style:{marginTop:"10px",textAlign:"center",fontFamily:"IBM Plex Mono,monospace",fontSize:"8.5px",color:"#181828",letterSpacing:"0.08em"}},"↑ Select a node to continue down the tree"),

      leafData&&React.createElement(Detail,{node:leafData,human,setHuman}),

      // ── FOOTER ─────────────────────────────────────────
      React.createElement("div",{style:{marginTop:"28px",fontFamily:"IBM Plex Mono,monospace",fontSize:"7.5px",color:"#0C0C1A",lineHeight:1.7,textAlign:"center"}},"All likelihood estimates are expressed as ranges only and represent structured research-based assessments — not actuarial calculations or professional advice of any kind. No user data collected or stored. © 2026 PTH Meridian · adel.tammam@pth-meridian.io")
    )
  );
}

    const domRoot = ReactDOM.createRoot(document.getElementById("root"));
    domRoot.render(React.createElement(AMuNTree));
  </script>
</body>
</html>
